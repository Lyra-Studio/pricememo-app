<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かいもの帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd0;
  --text: #2a2620;
  --text-muted: #8a8278;
  --accent: #3d6b4f;
  --accent-light: #e8f0eb;
  --accent2: #c17f24;
  --accent2-light: #fdf3e3;
  --danger: #c04040;
  --star-on: #e8a020;
  --best: #3d6b4f;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(42,38,32,0.08);
  --shadow-sm: 0 1px 4px rgba(42,38,32,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ===== HEADER ===== */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 16px;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.app-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.app-logo span { color: var(--accent2); font-style: italic; }

/* ===== NAV ===== */
nav {
  display: flex;
  gap: 4px;
}
.nav-btn {
  border: none;
  background: none;
  padding: 6px 14px;
  border-radius: 20px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--accent); background: var(--accent-light); }
.nav-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ===== MAIN LAYOUT ===== */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ===== PAGE ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== SECTION TITLE ===== */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* ===== SELECT ===== */
.select-wrap {
  position: relative;
  margin-bottom: 20px;
}
.select-wrap select {
  width: 100%;
  appearance: none;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 40px 12px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s;
}
.select-wrap select:focus { outline: none; border-color: var(--accent); }
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-muted);
  font-size: 13px;
}

/* ===== PRODUCT GRID ===== */
.products-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 32px;
}
@media (min-width: 600px) {
  .products-grid { grid-template-columns: 1fr 1fr; }
}

/* ===== PRODUCT CARD ===== */
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px 14px 10px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
  position: relative;
}
.product-card:hover { box-shadow: var(--shadow); }
.product-card.best {
  border-color: var(--accent);
  background: linear-gradient(135deg, #fff 60%, var(--accent-light) 100%);
}

.star-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  color: #ccc;
  transition: color 0.15s, transform 0.15s;
  flex-shrink: 0;
  margin-top: 2px;
}
.star-btn:hover { transform: scale(1.2); }
.star-btn.starred { color: var(--star-on); }

.card-body { flex: 1; min-width: 0; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.product-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  word-break: break-all;
}

.best-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  background: var(--accent);
  color: #fff;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}

.store-name {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}

.unit-price {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
}
.unit-price-unit { font-size: 11px; font-weight: 400; color: var(--text-muted); }

.total-price {
  font-size: 12px;
  color: var(--text-muted);
}

.card-meta {
  margin-top: 6px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}

.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text-muted);
}

.deal-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--accent2-light);
  color: var(--accent2);
  font-weight: 600;
}

.memo-text {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* ===== SHOPPING MEMO ===== */
.memo-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-sm);
}

.memo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.memo-title {
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.memo-count {
  font-size: 11px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

/* autocomplete wrap */
.autocomplete-wrap {
  position: relative;
  margin-bottom: 12px;
}
.memo-input-row {
  display: flex;
  gap: 8px;
}
.memo-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.2s;
}
.memo-input:focus { outline: none; border-color: var(--accent); }

.add-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.add-btn:hover { opacity: 0.88; }

.suggestions {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1.5px solid var(--accent);
  border-radius: 10px;
  box-shadow: var(--shadow);
  z-index: 50;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.suggestions.open { display: block; }

.suggestion-item {
  padding: 9px 14px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.1s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: var(--accent-light); }
.suggestion-item.new-item {
  color: var(--accent2);
  font-weight: 600;
}
.suggestion-store {
  font-size: 11px;
  color: var(--text-muted);
}

/* memo list */
.memo-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.memo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--bg);
  transition: opacity 0.2s;
}
.memo-item.checked { opacity: 0.5; }

.memo-check {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.memo-item-text {
  flex: 1;
  font-size: 14px;
}
.memo-item.checked .memo-item-text {
  text-decoration: line-through;
  color: var(--text-muted);
}

.delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 16px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
.delete-btn:hover { color: var(--danger); background: #ffeaea; }

/* clear done btn */
.memo-footer {
  margin-top: 10px;
  display: flex;
  justify-content: flex-end;
}
.clear-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: border-color 0.2s, color 0.2s;
}
.clear-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ===== PC 2-COLUMN LAYOUT ===== */
@media (min-width: 700px) {
  .product-page-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }
  .memo-sticky { position: sticky; top: 72px; }
}

/* ===== STORE PAGE ===== */
.store-product-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.store-product-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
}

.store-product-info { flex: 1; min-width: 0; }
.store-product-name { font-size: 13px; font-weight: 500; word-break: break-all; }
.store-product-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.store-product-price {
  text-align: right;
  flex-shrink: 0;
}
.store-price-main { font-size: 16px; font-weight: 700; color: var(--accent); }
.store-price-sub { font-size: 11px; color: var(--text-muted); }

/* ===== SEARCH PAGE ===== */
.search-input-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 15px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px 12px 38px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s;
}
.search-input:focus { outline: none; border-color: var(--accent); }

/* ===== ALL PRODUCTS PAGE ===== */
.all-products-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.all-product-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.all-product-name { flex: 1; word-break: break-all; }
.all-product-store { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.all-product-price { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; }

/* ===== RESPONSIVE ===== */
@media (max-width: 699px) {
  .product-page-layout { display: block; }
  .products-block { margin-bottom: 24px; }
}

/* === Scrollbar === */
.suggestions::-webkit-scrollbar { width: 6px; }
.suggestions::-webkit-scrollbar-track { background: transparent; }
.suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="app-logo">かいもの<span>帳</span></div>
    <nav>
      <button class="nav-btn active" onclick="showPage('products')">商品</button>
      <button class="nav-btn" onclick="showPage('stores')">店名</button>
      <button class="nav-btn" onclick="showPage('search')">検索</button>
      <button class="nav-btn" onclick="showPage('all')">一覧</button>
    </nav>
  </div>
</header>

<main class="main">

  <!-- ===== 商品ページ ===== -->
  <div class="page active" id="page-products">
    <div class="product-page-layout">

      <!-- 左: 商品比較 -->
      <div class="products-block">
        <div class="section-label">商品</div>
        <div class="select-wrap">
          <select id="product-select" onchange="showProductComparison()">
            <option value="">商品を選択してください</option>
          </select>
        </div>
        <div id="product-comparison"></div>
      </div>

      <!-- 右: 買い物メモ -->
      <div class="memo-sticky">
        <div class="section-label">今日の買い物メモ</div>
        <div class="memo-section">
          <div class="memo-header">
            <div class="memo-title">🛒 買い物メモ <span class="memo-count" id="memo-count">0</span></div>
          </div>

          <!-- 統合入力欄 -->
          <div class="autocomplete-wrap">
            <div class="memo-input-row">
              <input
                type="text"
                class="memo-input"
                id="memo-input"
                placeholder="商品を追加…（候補から選ぶか直接入力）"
                autocomplete="off"
                oninput="onMemoInput()"
                onfocus="onMemoFocus()"
                onkeydown="onMemoKeydown(event)"
              >
              <button class="add-btn" onclick="addMemoFromInput()">追加</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
          </div>

          <!-- メモリスト -->
          <div class="memo-list" id="memo-list"></div>

          <div class="memo-footer">
            <button class="clear-btn" onclick="clearChecked()">完了済みを削除</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== 店名ページ ===== -->
  <div class="page" id="page-stores">
    <div class="section-label">店名</div>
    <div class="select-wrap">
      <select id="store-select" onchange="showStoreProducts()">
        <option value="">店名を選択してください</option>
      </select>
    </div>
    <div id="store-products"></div>
  </div>

  <!-- ===== 検索ページ ===== -->
  <div class="page" id="page-search">
    <div class="section-label">検索</div>
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="商品名・店名・メモで検索…" oninput="runSearch(this.value)">
    </div>
    <div id="search-results"></div>
  </div>

  <!-- ===== 商品一覧ページ ===== -->
  <div class="page" id="page-all">
    <div class="section-label">商品一覧</div>
    <div class="all-products-list" id="all-products-list"></div>
  </div>

</main>

// 単価計算
function calcUnitPrice(item) {
  if (!item.amount || item.amount === 0) return null;
  const unit = item.unit;
  if (['g','ml'].includes(unit)) return item.price / item.amount;
  if (unit === '個' || unit === '本' || unit === '袋' || unit === '回') return item.price / item.amount;
  return item.price / item.amount;
}

rawData.forEach(d => {
  d.unitPrice = calcUnitPrice(d);
  d.starred = false;
});

// カテゴリ一覧
const categories = [...new Set(rawData.map(d => d.cat))];
// 店名一覧
const stores = [...new Set(rawData.map(d => d.store))].sort();

// =====================
// PAGE NAVIGATION
// =====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const map = {products:0, stores:1, search:2, all:3};
  btns[map[name]].classList.add('active');
  if (name === 'all') renderAllProducts();
  if (name === 'stores') initStores();
}

// =====================
// PRODUCT PAGE
// =====================
function initProductSelect() {
  const sel = document.getElementById('product-select');
  categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    sel.appendChild(opt);
  });
}

function formatUnitPrice(item) {
  const up = item.unitPrice;
  if (!up) return '—';
  const unit = item.unit;
  if (['g','ml'].includes(unit)) return (up * 100).toFixed(1) + '円/100' + unit;
  return up.toFixed(0) + '円/' + unit;
}

function showProductComparison() {
  const cat = document.getElementById('product-select').value;
  const container = document.getElementById('product-comparison');

  if (!cat) {
    container.innerHTML = '';
    return;
  }

  const items = rawData.filter(d => d.cat === cat);
  if (!items.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>該当商品がありません</p></div>';
    return;
  }

  // 有効な単価がある商品だけで最安を判定
  const withUP = items.filter(d => d.unitPrice !== null);
  const minUP = withUP.length ? Math.min(...withUP.map(d => d.unitPrice)) : null;

  const sorted = [...items].sort((a, b) => {
    if (a.unitPrice === null) return 1;
    if (b.unitPrice === null) return -1;
    return a.unitPrice - b.unitPrice;
  });

  container.innerHTML = '<div class="products-grid">' +
    sorted.map(item => {
      const isBest = item.unitPrice !== null && item.unitPrice === minUP && withUP.length > 1;
      const dealPct = (isBest && withUP.length > 1)
        ? Math.round((1 - minUP / Math.max(...withUP.map(d => d.unitPrice))) * 100)
        : 0;

      return `<div class="product-card${isBest ? ' best' : ''}">
        <button class="star-btn${item.starred ? ' starred' : ''}" onclick="toggleStar(this, '${item.name}', '${item.store}')" title="お気に入り">${item.starred ? '★' : '☆'}</button>
        <div class="card-body">
          <div class="card-top">
            <div class="product-name">${item.name}</div>
            ${isBest ? '<span class="best-badge">✦ 最安</span>' : ''}
          </div>
          <div class="store-name">🏪 ${item.store}</div>
          <div class="price-row">
            <span class="unit-price">${item.unitPrice !== null ? (item.unit === 'g' || item.unit === 'ml' ? (item.unitPrice*100).toFixed(1) : item.unitPrice.toFixed(1)) : '—'}</span>
            <span class="unit-price-unit">${item.unitPrice !== null ? '円/100' + (item.unit === 'g' || item.unit === 'ml' ? item.unit : '→ ' + item.price + '円') : ''}</span>
          </div>
          <div class="card-meta">
            <span class="tag">${item.price}円 / ${item.amount}${item.unit}</span>
            ${isBest && dealPct > 0 ? `<span class="deal-tag">▼ ${dealPct}% お得</span>` : ''}
          </div>
          ${item.memo ? `<div class="memo-text">📝 ${item.memo}</div>` : ''}
        </div>
      </div>`;
    }).join('') + '</div>';
}

function toggleStar(btn, name, store) {
  const item = rawData.find(d => d.name === name && d.store === store);
  if (!item) return;
  item.starred = !item.starred;
  btn.classList.toggle('starred');
  btn.textContent = item.starred ? '★' : '☆';
}

// =====================
// SHOPPING MEMO
// =====================
let memoItems = [];
let selectedSuggestionIndex = -1;

function initMemoAutocomplete() {
  // 全商品名（ユニーク）を候補に
}

function getAllProductNames() {
  const seen = new Set();
  return rawData.filter(d => {
    if (seen.has(d.name)) return false;
    seen.add(d.name);
    return true;
  });
}

function onMemoInput() {
  const val = document.getElementById('memo-input').value.trim();
  showSuggestions(val);
}

function onMemoFocus() {
  const val = document.getElementById('memo-input').value.trim();
  showSuggestions(val);
}

function showSuggestions(query) {
  const box = document.getElementById('suggestions');
  const all = getAllProductNames();

  let filtered;
  if (!query) {
    filtered = all.slice(0, 20);
  } else {
    filtered = all.filter(d => d.name.includes(query) || d.cat.includes(query));
  }

  let html = '';
  filtered.forEach((d, i) => {
    html += `<div class="suggestion-item" data-name="${d.name}" onclick="selectSuggestion('${d.name.replace(/'/g,"\\'")}')">
      <span>${d.name}</span>
      <span class="suggestion-store">${d.store} / ${d.cat}</span>
    </div>`;
  });

  if (query && !filtered.find(d => d.name === query)) {
    html += `<div class="suggestion-item new-item" onclick="selectSuggestion('${query.replace(/'/g,"\\'")}')">
      ＋ 「${query}」を追加
    </div>`;
  }

  box.innerHTML = html;
  box.classList.toggle('open', html.length > 0);
  selectedSuggestionIndex = -1;
}

function selectSuggestion(name) {
  document.getElementById('memo-input').value = name;
  closeSuggestions();
  addMemoItem(name);
}

function closeSuggestions() {
  document.getElementById('suggestions').classList.remove('open');
  document.getElementById('memo-input').value = '';
}

function onMemoKeydown(e) {
  const box = document.getElementById('suggestions');
  const items = box.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, items.length - 1);
    items.forEach((el, i) => el.style.background = i === selectedSuggestionIndex ? 'var(--accent-light)' : '');
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, 0);
    items.forEach((el, i) => el.style.background = i === selectedSuggestionIndex ? 'var(--accent-light)' : '');
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedSuggestionIndex >= 0 && items[selectedSuggestionIndex]) {
      items[selectedSuggestionIndex].click();
    } else {
      addMemoFromInput();
    }
  } else if (e.key === 'Escape') {
    closeSuggestions();
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('suggestions').classList.remove('open');
  }
});

function addMemoFromInput() {
  const val = document.getElementById('memo-input').value.trim();
  if (!val) return;
  addMemoItem(val);
  document.getElementById('memo-input').value = '';
  closeSuggestions();
}

function addMemoItem(text) {
  if (!text) return;
  memoItems.push({ text, checked: false, id: Date.now() + Math.random() });
  renderMemo();
}

function renderMemo() {
  const list = document.getElementById('memo-list');
  const count = document.getElementById('memo-count');

  count.textContent = memoItems.filter(m => !m.checked).length;

  if (!memoItems.length) {
    list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">メモはまだありません</div>';
    return;
  }

  list.innerHTML = memoItems.map(item => `
    <div class="memo-item${item.checked ? ' checked' : ''}" id="memo-${item.id}">
      <input type="checkbox" class="memo-check" ${item.checked ? 'checked' : ''} onchange="toggleMemo(${item.id})">
      <span class="memo-item-text">${item.text}</span>
      <button class="delete-btn" onclick="deleteMemo(${item.id})" title="削除">✕</button>
    </div>
  `).join('');
}

function toggleMemo(id) {
  const item = memoItems.find(m => m.id === id);
  if (item) { item.checked = !item.checked; renderMemo(); }
}

function deleteMemo(id) {
  memoItems = memoItems.filter(m => m.id !== id);
  renderMemo();
}

function clearChecked() {
  memoItems = memoItems.filter(m => !m.checked);
  renderMemo();
}

function initStores() {
  const sel = document.getElementById('store-select');
  if (sel.options.length <= 1) {
    stores.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sel.appendChild(opt);
    });
  }
}

function showStoreProducts() {
  const store = document.getElementById('store-select').value;
  const container = document.getElementById('store-products');

  if (!store) { container.innerHTML = ''; return; }

  const items = rawData.filter(d => d.store === store)
    .sort((a, b) => a.cat.localeCompare(b.cat));

  if (!items.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>商品がありません</p></div>';
    return;
  }

  let html = '<div class="store-product-list">';
  let lastCat = null;
  items.forEach(item => {
    if (item.cat !== lastCat) {
      if (lastCat !== null) html += '</div>';
      html += `<div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;margin:14px 0 6px;">${item.cat}</div><div>`;
      lastCat = item.cat;
    }
    const up = item.unitPrice;
    const upStr = up ? ((['g','ml'].includes(item.unit)) ? (up*100).toFixed(1)+'円/100'+item.unit : up.toFixed(1)+'円/'+item.unit) : '—';
    html += `<div class="store-product-row">
      <div class="store-product-info">
        <div class="store-product-name">${item.name}</div>
        <div class="store-product-sub">${item.amount}${item.unit} ${item.memo ? '📝 '+item.memo : ''}</div>
      </div>
      <div class="store-product-price">
        <div class="store-price-main">${item.price}円</div>
        <div class="store-price-sub">${upStr}</div>
      </div>
    </div>`;
  });
  html += '</div></div>';
  container.innerHTML = html;
}

// =====================
// SEARCH PAGE
// =====================
function runSearch(query) {
  const container = document.getElementById('search-results');
  const q = query.trim().toLowerCase();

  if (!q) { container.innerHTML = ''; return; }

  const results = rawData.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.store.toLowerCase().includes(q) ||
    d.cat.toLowerCase().includes(q) ||
    (d.memo && d.memo.toLowerCase().includes(q))
  );

  if (!results.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>「' + query + '」に一致する商品が見つかりません</p></div>';
    return;
  }

  container.innerHTML = '<div class="all-products-list">' +
    results.map(item => {
      const up = item.unitPrice;
      const upStr = up ? ((['g','ml'].includes(item.unit)) ? (up*100).toFixed(1)+'円/100'+item.unit : up.toFixed(1)+'円/'+item.unit) : '';
      return `<div class="all-product-row">
        <div class="all-product-name">${item.name}<br><span style="font-size:11px;color:var(--text-muted)">${item.cat} / ${item.store}</span></div>
        <div class="all-product-store"></div>
        <div class="all-product-price">${item.price}円<br><span style="font-size:11px;font-weight:400;color:var(--text-muted)">${upStr}</span></div>
      </div>`;
    }).join('') + '</div>';
}

// =====================
// ALL PRODUCTS PAGE
// =====================
function renderAllProducts() {
  const sorted = [...rawData].sort((a, b) => a.cat.localeCompare(b.cat) || a.store.localeCompare(b.store));
  const container = document.getElementById('all-products-list');
  container.innerHTML = sorted.map(item => {
    const up = item.unitPrice;
    const upStr = up ? ((['g','ml'].includes(item.unit)) ? (up*100).toFixed(1)+'円/100'+item.unit : up.toFixed(1)+'円/'+item.unit) : '';
    return `<div class="all-product-row">
      <div style="font-size:10px;color:var(--text-muted);white-space:nowrap">${item.cat}</div>
      <div class="all-product-name">${item.name}</div>
      <div class="all-product-store">${item.store}</div>
      <div class="all-product-price">${item.price}円${upStr ? '<br><span style="font-size:11px;font-weight:400">'+upStr+'</span>' : ''}</div>
    </div>`;
  }).join('');
}
