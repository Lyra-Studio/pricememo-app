<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0; --surface:#fff; --surface2:#f0ede6; --border:#e0dbd0;
  --text:#2a2620; --text-sub:#5a564f; --text-muted:#8a8278;
  --accent:#3d6b4f; --accent-light:#e8f0eb;
  --accent2:#c17f24; --accent2-light:#fdf3e3;
  --danger:#c04040; --star-on:#e8a020;
  --radius:10px; --shadow:0 2px 12px rgba(42,38,32,.08); --shadow-sm:0 1px 4px rgba(42,38,32,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.app-logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent)}
.app-logo span{color:var(--accent2);font-style:italic}
nav{display:flex;gap:4px}
.nav-btn{border:none;background:none;padding:6px 13px;border-radius:20px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--accent);background:var(--accent-light)}
.nav-btn.active{background:var(--accent);color:#fff}

/* LAYOUT */
.main{max-width:900px;margin:0 auto;padding:18px 16px 80px}
.page{display:none}.page.active{display:block}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}

/* SELECT */
.select-wrap{position:relative;margin-bottom:14px}
.select-wrap select{width:100%;appearance:none;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 38px 11px 14px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .2s}
.select-wrap select:focus{outline:none;border-color:var(--accent)}
.select-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted);font-size:13px}

/* === 全ページ共通アイテム行 === */
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.item-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 10px 10px 10px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow .18s,transform .12s;position:relative}
.item-row:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.item-row:active{transform:translateY(0);opacity:.9}
.item-row.best-row{border-color:var(--accent)}

/* 星 */
.star-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:2px;line-height:1;color:#ccc;transition:color .15s,transform .15s;flex-shrink:0}
.star-btn:hover{transform:scale(1.2)}
.star-btn.on{color:var(--star-on)}

/* 商品情報 */
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-all}
.item-sub{font-size:11px;color:var(--text-muted);margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-badges{margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}

/* 価格ブロック（右） */
.item-price-block{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.item-price-main{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.item-price-sub{font-size:11px;color:var(--text-muted)}

/* バッジ */
.best-badge{font-size:10px;font-weight:700;background:var(--accent);color:#fff;padding:1px 6px;border-radius:6px;white-space:nowrap}
.deal-badge{font-size:10px;font-weight:600;background:var(--accent2-light);color:var(--accent2);padding:1px 6px;border-radius:6px;white-space:nowrap}
.cat-badge{font-size:10px;background:var(--surface2);color:var(--text-muted);padding:1px 6px;border-radius:6px}

/* メモ追加ボタン */
.memo-add-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:'Noto Sans JP',sans-serif;font-size:10px;color:var(--accent);cursor:pointer;flex-shrink:0;transition:background .15s,border-color .15s;white-space:nowrap}
.memo-add-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.memo-add-btn:active{background:var(--accent);color:#fff}

/* 矢印 */
.item-arrow{font-size:13px;color:var(--border);flex-shrink:0}

/* カテゴリ区切り */
.cat-divider{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:10px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px}

/* EMPTY */
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted)}
.empty-state .icon{font-size:30px;margin-bottom:8px}
.empty-state p{font-size:13px}

/* === 商品ページ 2カラム === */
@media(min-width:700px){
  .product-page-layout{display:grid;grid-template-columns:1fr 310px;gap:24px;align-items:start}
  .memo-sticky{position:sticky;top:70px}
}
@media(max-width:699px){
  .product-page-layout{display:block}
  .products-block{margin-bottom:24px}
}

/* 登録ボタン */
.add-product-btn{background:none;border:1.5px solid var(--accent);border-radius:8px;padding:4px 11px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.add-product-btn:hover{background:var(--accent);color:#fff}

/* === 買い物メモ === */
.memo-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm)}
.memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.memo-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.memo-count{font-size:10px;background:var(--accent-light);color:var(--accent);padding:1px 7px;border-radius:10px;font-weight:600}
.autocomplete-wrap{position:relative;margin-bottom:10px}
.memo-input-row{display:flex;flex-direction:column;gap:7px}
@media(min-width:480px){.memo-input-row{flex-direction:row}}
.memo-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--bg);color:var(--text);transition:border-color .2s}
.memo-input:focus{outline:none;border-color:var(--accent)}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.add-btn:hover{opacity:.88}
.suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-radius:10px;box-shadow:var(--shadow);z-index:50;max-height:200px;overflow-y:auto;display:none}
.suggestions.open{display:block}
.suggestion-item{padding:8px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{background:var(--accent-light)}
.suggestion-item.new-item{color:var(--accent2);font-weight:600}
.suggestion-store{font-size:11px;color:var(--text-muted)}
.memo-list{display:flex;flex-direction:column;gap:5px}
.memo-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;background:var(--bg);transition:opacity .2s}
.memo-item.checked{opacity:.45}
.memo-check{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.memo-item-text{flex:1;font-size:13px}
.memo-item.checked .memo-item-text{text-decoration:line-through;color:var(--text-muted)}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:2px 4px;border-radius:4px;transition:color .15s,background .15s;line-height:1}
.delete-btn:hover{color:var(--danger);background:#ffeaea}
.suggestions::-webkit-scrollbar{width:5px}
.suggestions::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* 検索 */
.search-wrap{position:relative;margin-bottom:14px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 13px 11px 36px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);transition:border-color .2s}
.search-input:focus{outline:none;border-color:var(--accent)}

/* === MODAL === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,38,32,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:0 0 32px;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 14px}
.modal-header{padding:0 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700}
.modal-close{background:none;border:none;font-size:18px;color:var(--text-muted);cursor:pointer;padding:4px 7px;border-radius:6px;transition:background .15s}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:14px 18px}
.modal-badge-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
/* 詳細グリッド */
.modal-detail-grid{display:grid;grid-template-columns:auto 1fr;gap:0;margin-bottom:4px}
.mdg-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;padding:7px 14px 7px 0;border-bottom:1px solid var(--border);white-space:nowrap}
.mdg-value{font-size:14px;padding:7px 0;border-bottom:1px solid var(--border)}
.mdg-price{font-size:20px;font-weight:700;color:var(--text)}
.modal-actions{padding:14px 18px 0;display:flex;gap:9px}
.btn-edit{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-edit:hover{opacity:.88}
.btn-delete{background:none;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--danger);cursor:pointer;transition:border-color .2s,background .2s}
.btn-delete:hover{border-color:var(--danger);background:#fff0f0}
/* 編集 */
.edit-panel{display:none;padding:0 18px}
.edit-panel.open{display:block}
.edit-field{margin-bottom:11px}
.edit-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;margin-bottom:4px;display:block}
.edit-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);background:var(--bg);transition:border-color .2s}
.edit-input:focus{outline:none;border-color:var(--accent)}
.edit-input-row{display:flex;gap:7px}
.edit-input-row .edit-input{flex:1}
.edit-input-unit{width:60px;border:1.5px solid var(--border);border-radius:8px;padding:8px 9px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
.edit-btn-row{display:flex;gap:7px;margin-top:14px}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:.88}
.btn-cancel-edit{background:none;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:border-color .2s}
.btn-cancel-edit:hover{border-color:var(--accent);color:var(--accent)}
/* 登録モーダル */
.add-modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,38,32,.45);z-index:300;align-items:flex-end;justify-content:center}
.add-modal-overlay.open{display:flex}
.add-modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:0 0 32px;animation:slideUp .22s ease}
.add-modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 14px}
.add-modal-header{padding:0 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.add-modal-body{padding:14px 18px 0}
.add-btn-row{display:flex;gap:7px;margin-top:14px}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="app-logo">Ga<span>uge</span></div>
    <nav>
      <button class="nav-btn active" onclick="showPage('products')">商品</button>
      <button class="nav-btn" onclick="showPage('stores')">店名</button>
      <button class="nav-btn" onclick="showPage('search')">検索</button>
      <button class="nav-btn" onclick="showPage('all')">一覧</button>
    </nav>
  </div>
</header>

<main class="main">

  <!-- 商品ページ -->
  <div class="page active" id="page-products">
    <div class="product-page-layout">
      <div class="products-block">
        <div class="page-head">
          <div class="section-label">商品</div>
          <button class="add-product-btn" onclick="openAddModal()">＋ 商品登録</button>
        </div>
        <div class="select-wrap">
          <select id="product-select" onchange="renderProductComparison()">
            <option value="">商品を選択してください</option>
          </select>
        </div>
        <div id="product-comparison"></div>
      </div>
      <div class="memo-sticky">
        <div class="section-label" style="margin-bottom:10px">今日の買い物メモ</div>
        <div class="memo-section">
          <div class="memo-header">
            <div class="memo-title">🛒 買い物メモ <span class="memo-count" id="memo-count">0</span></div>
          </div>
          <div class="autocomplete-wrap">
            <div class="memo-input-row">
              <input type="text" class="memo-input" id="memo-input"
                placeholder="商品を追加…（候補または自由入力）"
                autocomplete="off"
                oninput="onMemoInput()" onfocus="onMemoFocus()" onkeydown="onMemoKeydown(event)">
              <button class="add-btn" onclick="addMemoFromInput()">追加</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
          </div>
          <div class="memo-list" id="memo-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 店名ページ -->
  <div class="page" id="page-stores">
    <div class="section-label" style="margin-bottom:10px">店名</div>
    <div class="select-wrap">
      <select id="store-select" onchange="renderStoreProducts()">
        <option value="">店名を選択してください</option>
      </select>
    </div>
    <div id="store-products"></div>
  </div>

  <!-- 検索ページ -->
  <div class="page" id="page-search">
    <div class="section-label" style="margin-bottom:10px">検索</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="商品名・店名・カテゴリ・メモで検索…" oninput="renderSearch(this.value)">
    </div>
    <div id="search-results"></div>
  </div>

  <!-- 一覧ページ -->
  <div class="page" id="page-all">
    <div class="section-label" style="margin-bottom:10px">商品一覧</div>
    <div id="all-products"></div>
  </div>

</main>

<!-- 詳細/編集モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modal-detail">
      <div class="modal-header">
        <div class="modal-title" id="modal-name"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-badge-row" id="modal-badges"></div>
        <div class="modal-detail-grid" id="modal-grid"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-edit" onclick="openEditPanel()">✏️ 編集</button>
        <button class="btn-delete" onclick="deleteItem()">削除</button>
      </div>
    </div>
    <div class="edit-panel" id="edit-panel">
      <div class="modal-header" style="margin-bottom:0">
        <div class="modal-title">編集</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div style="height:12px"></div>
      <div class="edit-field"><label class="edit-label">商品名</label><input type="text" class="edit-input" id="edit-name"></div>
      <div class="edit-field"><label class="edit-label">カテゴリ</label><input type="text" class="edit-input" id="edit-cat"></div>
      <div class="edit-field"><label class="edit-label">店名</label><input type="text" class="edit-input" id="edit-store"></div>
      <div class="edit-field"><label class="edit-label">価格（円）</label><input type="number" class="edit-input" id="edit-price"></div>
      <div class="edit-field">
        <label class="edit-label">量・単位</label>
        <div class="edit-input-row">
          <input type="number" class="edit-input" id="edit-amount" placeholder="例: 250">
          <input type="text" class="edit-input-unit" id="edit-unit" placeholder="g">
        </div>
      </div>
      <div class="edit-field"><label class="edit-label">メモ</label><input type="text" class="edit-input" id="edit-memo" placeholder="任意"></div>
      <div class="edit-btn-row">
        <button class="btn-save" onclick="saveEdit()">✔ 更新</button>
        <button class="btn-cancel-edit" onclick="cancelEdit()">キャンセル</button>
      </div>
      <div style="height:8px"></div>
    </div>
  </div>
</div>

<!-- 商品登録モーダル -->
<div class="add-modal-overlay" id="add-modal-overlay" onclick="if(event.target===this)closeAddModal()">
  <div class="add-modal-sheet">
    <div class="add-modal-handle"></div>
    <div class="add-modal-header">
      <div class="modal-title">＋ 商品登録</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="add-modal-body">
      <div class="edit-field"><label class="edit-label">商品名 <span style="color:var(--danger)">*</span></label><input type="text" class="edit-input" id="add-name" placeholder="例: 国産木綿豆腐"></div>
      <div class="edit-field"><label class="edit-label">カテゴリ <span style="color:var(--danger)">*</span></label><input type="text" class="edit-input" id="add-cat" placeholder="例: 豆腐" list="cat-list"><datalist id="cat-list"></datalist></div>
      <div class="edit-field"><label class="edit-label">店名 <span style="color:var(--danger)">*</span></label><input type="text" class="edit-input" id="add-store" placeholder="例: マックスバリュ" list="store-list"><datalist id="store-list"></datalist></div>
      <div class="edit-field"><label class="edit-label">価格（円） <span style="color:var(--danger)">*</span></label><input type="number" class="edit-input" id="add-price" placeholder="例: 88"></div>
      <div class="edit-field">
        <label class="edit-label">量・単位</label>
        <div class="edit-input-row">
          <input type="number" class="edit-input" id="add-amount" placeholder="例: 450">
          <input type="text" class="edit-input-unit" id="add-unit" placeholder="g">
        </div>
      </div>
      <div class="edit-field"><label class="edit-label">メモ</label><input type="text" class="edit-input" id="add-memo" placeholder="任意"></div>
      <div class="add-btn-row">
        <button class="btn-save" onclick="saveNewProduct()">✔ 登録</button>
        <button class="btn-cancel-edit" onclick="closeAddModal()">キャンセル</button>
      </div>
      <div style="height:8px"></div>
    </div>
  </div>
</div>

<script>
// =====================
// DATA（Excelから最新 + favorite列反映）
// =====================
const rawData = [
  {fav:true, name:"野菜セット",store:"セブン",cat:"カット野菜",price:127,amount:260,unit:"g",memo:"少し量が多い"},

// =====================
// HELPERS
// =====================
function calcUnitPrice(d){
  if(!d.amount||d.amount===0)return null;
  return d.price/d.amount;
}
rawData.forEach(d=>{d.unitPrice=calcUnitPrice(d);});

function fmtUP(d){
  const up=d.unitPrice;
  if(!up)return null;
  if(['g','ml'].includes(d.unit))return(up*100).toFixed(1)+'円/100'+d.unit;
  return up.toFixed(1)+'円/'+d.unit;
}
function fmtAmt(d){return d.amount+d.unit;}
function esc(s){return s.replace(/'/g,"\\'");}

// =====================
// ★ お気に入り共通（同一商品名+店名をすべて同期）
// =====================
function toggleFavByKey(name,store){
  const items=rawData.filter(x=>x.name===name&&x.store===store);
  if(!items.length)return;
  const newVal=!items[0].fav;
  items.forEach(x=>{x.fav=newVal;});
  refreshCurrentPage();
}

function refreshCurrentPage(){
  const id=document.querySelector('.page.active').id;
  if(id==='page-products')  renderProductComparison();
  if(id==='page-stores')    renderStoreProducts();
  if(id==='page-all')       renderAllProducts();
  // 検索は自動再描画しない（入力状態を保持）
}

// =====================
// 全ページ共通カード HTML ビルダー
// =====================
function buildRow(d, mode, minUP, maxUP){
  const isBest=d.unitPrice!==null&&d.unitPrice===minUP&&minUP!==maxUP;
  const dealPct=(isBest&&maxUP)?Math.round((1-minUP/maxUP)*100):0;
  const up=fmtUP(d);

  let badges='';
  if(isBest)  badges+=`<span class="best-badge">✦ 最安</span>`;
  if(dealPct>0) badges+=`<span class="deal-badge">▼${dealPct}%</span>`;

  // サブ行：店名 + 単価（補助）
  let sub=`<span>${d.store}</span>`;
  if(up) sub+=`<span>${up}</span>`;
  if(d.memo) sub+=`<span style="color:var(--accent2)">📝</span>`;

  // メモ追加ボタン（商品ページのみ）
  const memoBtn=mode==='product'
    ?`<button class="memo-add-btn" onclick="event.stopPropagation();addMemoItem('${esc(d.name)}')" title="買い物メモへ追加">＋</button>`
    :'';

  return `<div class="item-row${isBest?' best-row':''}" onclick="openModal('${esc(d.name)}','${esc(d.store)}')">
    <button class="star-btn${d.fav?' on':''}" onclick="event.stopPropagation();toggleFavByKey('${esc(d.name)}','${esc(d.store)}')" title="お気に入り">${d.fav?'★':'☆'}</button>
    <div class="item-info">
      <div class="item-name">${d.name}</div>
      <div class="item-sub">${sub}</div>
      ${badges?`<div class="item-badges">${badges}</div>`:''}
    </div>
    <div class="item-price-block">
      <div class="item-price-main">${d.price}<span style="font-size:11px;font-weight:400;color:var(--text-muted)">円</span></div>
      <div class="item-price-sub">${fmtAmt(d)}</div>
    </div>
    ${memoBtn}
    <span class="item-arrow">›</span>
  </div>`;
}

function getMinMax(cat){
  const items=rawData.filter(x=>x.cat===cat&&x.unitPrice!==null);
  if(!items.length)return{minUP:null,maxUP:null};
  return{minUP:Math.min(...items.map(x=>x.unitPrice)),maxUP:Math.max(...items.map(x=>x.unitPrice))};
}

// =====================
// 商品ページ
// =====================
function initProductSelect(){
  const sel=document.getElementById('product-select');
  [...new Set(rawData.map(d=>d.cat))].forEach(c=>{
    const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
  });
}

function renderProductComparison(){
  const cat=document.getElementById('product-select').value;
  const el=document.getElementById('product-comparison');
  if(!cat){el.innerHTML='';return;}
  const items=rawData.filter(d=>d.cat===cat);
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>該当商品なし</p></div>';return;}
  const{minUP,maxUP}=getMinMax(cat);
  const sorted=[...items].sort((a,b)=>{
    if(a.unitPrice===null)return 1;if(b.unitPrice===null)return -1;return a.unitPrice-b.unitPrice;
  });
  el.innerHTML=`<div class="item-list">${sorted.map(d=>buildRow(d,'product',minUP,maxUP)).join('')}</div>`;
}

// =====================
// 店名ページ
// =====================
function initStoreSelect(){
  const sel=document.getElementById('store-select');
  if(sel.options.length>1)return;
  [...new Set(rawData.map(d=>d.store))].sort().forEach(s=>{
    const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);
  });
}

function renderStoreProducts(){
  const store=document.getElementById('store-select').value;
  const el=document.getElementById('store-products');
  if(!store){el.innerHTML='';return;}
  const items=rawData.filter(d=>d.store===store).sort((a,b)=>a.cat.localeCompare(b.cat,'ja')||a.price-b.price);
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>商品なし</p></div>';return;}
  let html='<div class="item-list">',lastCat=null;
  items.forEach(d=>{
    if(d.cat!==lastCat){html+=`<div class="cat-divider">${d.cat}</div>`;lastCat=d.cat;}
    const{minUP,maxUP}=getMinMax(d.cat);
    html+=buildRow(d,'other',minUP,maxUP);
  });
  el.innerHTML=html+'</div>';
}

// =====================
// 検索ページ
// =====================
function renderSearch(query){
  const el=document.getElementById('search-results');
  const q=query.trim().toLowerCase();
  if(!q){el.innerHTML='';return;}
  const results=rawData.filter(d=>
    d.name.toLowerCase().includes(q)||d.store.toLowerCase().includes(q)||
    d.cat.toLowerCase().includes(q)||(d.memo&&d.memo.toLowerCase().includes(q))
  ).sort((a,b)=>a.cat.localeCompare(b.cat,'ja')||a.price-b.price);
  if(!results.length){el.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>「${query}」は見つかりません</p></div>`;return;}
  let html='<div class="item-list">',lastCat=null;
  results.forEach(d=>{
    if(d.cat!==lastCat){html+=`<div class="cat-divider">${d.cat}</div>`;lastCat=d.cat;}
    const{minUP,maxUP}=getMinMax(d.cat);
    html+=buildRow(d,'other',minUP,maxUP);
  });
  el.innerHTML=html+'</div>';
}

// =====================
// 一覧ページ
// =====================
function renderAllProducts(){
  const el=document.getElementById('all-products');
  const sorted=[...rawData].sort((a,b)=>a.cat.localeCompare(b.cat,'ja')||a.price-b.price);
  let html='<div class="item-list">',lastCat=null;
  sorted.forEach(d=>{
    if(d.cat!==lastCat){html+=`<div class="cat-divider">${d.cat}</div>`;lastCat=d.cat;}
    const{minUP,maxUP}=getMinMax(d.cat);
    html+=buildRow(d,'other',minUP,maxUP);
  });
  el.innerHTML=html+'</div>';
}

// =====================
// ページ切替
// =====================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn')[{products:0,stores:1,search:2,all:3}[name]].classList.add('active');
  if(name==='stores')initStoreSelect();
  if(name==='all')renderAllProducts();
}

let modalItem=null;

function openModal(name,store){
  const d=rawData.find(x=>x.name===name&&x.store===store);
  if(!d)return;
  modalItem=d;
  document.getElementById('modal-name').textContent=d.name;

  const{minUP}=getMinMax(d.cat);
  const catCnt=rawData.filter(x=>x.cat===d.cat&&x.unitPrice!==null).length;
  const isBest=d.unitPrice!==null&&d.unitPrice===minUP&&catCnt>1;

  let badges=`<span class="cat-badge">${d.cat}</span>`;
  if(isBest)badges+=' <span class="best-badge">✦ 最安</span>';
  if(d.fav) badges+=` <span style="font-size:13px;color:var(--star-on)">★</span>`;
  document.getElementById('modal-badges').innerHTML=badges;

  const up=fmtUP(d);
  let grid=`
    <span class="mdg-label">販売価格</span><span class="mdg-value"><span class="mdg-price">${d.price}</span> <span style="font-size:13px;color:var(--text-muted)">円</span></span>
    <span class="mdg-label">量</span><span class="mdg-value">${fmtAmt(d)}</span>
    <span class="mdg-label">単価</span><span class="mdg-value">${up||'—'}</span>
    <span class="mdg-label">店名</span><span class="mdg-value">${d.store}</span>`;
  if(d.memo)grid+=`<span class="mdg-label">メモ</span><span class="mdg-value">${d.memo}</span>`;
  document.getElementById('modal-grid').innerHTML=grid;

  document.getElementById('modal-detail').style.display='';
  document.getElementById('edit-panel').classList.remove('open');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';modalItem=null;
}
function openEditPanel(){
  if(!modalItem)return;
  document.getElementById('edit-name').value=modalItem.name;
  document.getElementById('edit-cat').value=modalItem.cat;
  document.getElementById('edit-store').value=modalItem.store;
  document.getElementById('edit-price').value=modalItem.price;
  document.getElementById('edit-amount').value=modalItem.amount;
  document.getElementById('edit-unit').value=modalItem.unit;
  document.getElementById('edit-memo').value=modalItem.memo||'';
  document.getElementById('modal-detail').style.display='none';
  document.getElementById('edit-panel').classList.add('open');
}
function cancelEdit(){
  document.getElementById('modal-detail').style.display='';
  document.getElementById('edit-panel').classList.remove('open');
}
function saveEdit(){
  if(!modalItem)return;
  modalItem.name  =document.getElementById('edit-name').value.trim()||modalItem.name;
  modalItem.cat   =document.getElementById('edit-cat').value.trim()||modalItem.cat;
  modalItem.store =document.getElementById('edit-store').value.trim()||modalItem.store;
  modalItem.price =parseFloat(document.getElementById('edit-price').value)||modalItem.price;
  modalItem.amount=parseFloat(document.getElementById('edit-amount').value)||modalItem.amount;
  modalItem.unit  =document.getElementById('edit-unit').value.trim()||modalItem.unit;
  modalItem.memo  =document.getElementById('edit-memo').value.trim();
  modalItem.unitPrice=calcUnitPrice(modalItem);
  closeModal();refreshCurrentPage();
}
function deleteItem(){
  if(!modalItem)return;
  if(!confirm(`「${modalItem.name}」（${modalItem.store}）を削除しますか？`))return;
  rawData.splice(rawData.indexOf(modalItem),1);
  closeModal();refreshCurrentPage();
}

  document.getElementById('store-list').innerHTML=[...new Set(rawData.map(d=>d.store))].map(s=>`<option value="${s}">`).join('');

function saveNewProduct(){
  const name=document.getElementById('add-name').value.trim();
  const cat=document.getElementById('add-cat').value.trim();
  const store=document.getElementById('add-store').value.trim();
  const price=parseFloat(document.getElementById('add-price').value);
  if(!name||!cat||!store||isNaN(price)){alert('商品名・カテゴリ・店名・価格は必須です');return;}
  const amount=parseFloat(document.getElementById('add-amount').value)||1;
  const unit=document.getElementById('add-unit').value.trim()||'g';
  const memo=document.getElementById('add-memo').value.trim();
  const nd={fav:false,name,store,cat,price,amount,unit,memo,unitPrice:null};
  nd.unitPrice=calcUnitPrice(nd);rawData.push(nd);
  const sel=document.getElementById('product-select');
  if(![...sel.options].find(o=>o.value===cat)){const o=document.createElement('option');o.value=cat;o.textContent=cat;sel.appendChild(o);}
  closeAddModal();
  document.getElementById('product-select').value=cat;
  renderProductComparison();
}

}
function onMemoInput(){showSugs(document.getElementById('memo-input').value.trim());}
function onMemoFocus(){showSugs(document.getElementById('memo-input').value.trim());}
function showSugs(q){
  const box=document.getElementById('suggestions');
  const all=getUniqProducts();
  const fil=q?all.filter(d=>d.name.includes(q)||d.cat.includes(q)):all.slice(0,20);
  let html=fil.map(d=>`<div class="suggestion-item" onclick="selSug('${esc(d.name)}')"><span>${d.name}</span><span class="suggestion-store">${d.store}/${d.cat}</span></div>`).join('');
  if(q&&!fil.find(d=>d.name===q))html+=`<div class="suggestion-item new-item" onclick="selSug('${esc(q)}')">＋「${q}」を追加</div>`;
  box.innerHTML=html;box.classList.toggle('open',html.length>0);suggIdx=-1;
}
function selSug(name){
  document.getElementById('suggestions').classList.remove('open');
  document.getElementById('memo-input').value='';
  addMemoItem(name);
}
function onMemoKeydown(e){
  const items=document.getElementById('suggestions').querySelectorAll('.suggestion-item');
  if(e.key==='ArrowDown'){e.preventDefault();suggIdx=Math.min(suggIdx+1,items.length-1);items.forEach((el,i)=>el.style.background=i===suggIdx?'var(--accent-light)':'');}
  else if(e.key==='ArrowUp'){e.preventDefault();suggIdx=Math.max(suggIdx-1,0);items.forEach((el,i)=>el.style.background=i===suggIdx?'var(--accent-light)':'');}
  else if(e.key==='Enter'){e.preventDefault();if(suggIdx>=0&&items[suggIdx])items[suggIdx].click();else addMemoFromInput();}
  else if(e.key==='Escape')document.getElementById('suggestions').classList.remove('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.autocomplete-wrap'))document.getElementById('suggestions').classList.remove('open');});
function addMemoFromInput(){
  const val=document.getElementById('memo-input').value.trim();
  if(!val)return;
  addMemoItem(val);
  document.getElementById('memo-input').value='';
  document.getElementById('suggestions').classList.remove('open');
}
function addMemoItem(text){
  if(!text)return;
  memoItems.push({text,checked:false,id:Date.now()+Math.random()});
  renderMemo();
}
function renderMemo(){
  const list=document.getElementById('memo-list');
  const count=document.getElementById('memo-count');
  count.textContent=memoItems.filter(m=>!m.checked).length;
  if(!memoItems.length){list.innerHTML='<div style="text-align:center;padding:14px;color:var(--text-muted);font-size:12px;">メモはまだありません</div>';return;}
  list.innerHTML=memoItems.map(m=>`<div class="memo-item${m.checked?' checked':''}"><input type="checkbox" class="memo-check" ${m.checked?'checked':''} onchange="toggleMemo(${m.id})"><span class="memo-item-text">${m.text}</span><button class="delete-btn" onclick="deleteMemo(${m.id})" title="削除">✕</button></div>`).join('');
}
function toggleMemo(id){const m=memoItems.find(x=>x.id===id);if(m){m.checked=!m.checked;renderMemo();}}
function deleteMemo(id){memoItems=memoItems.filter(x=>x.id!==id);renderMemo();}

// INIT
initProductSelect();
renderMemo();
</script>
</body>
</html>
